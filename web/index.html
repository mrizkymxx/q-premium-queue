<!DOCTYPE html>
<html lang="id">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Q-PREMIUM — Sistem Manajemen Antrian Digital Kelas Premium. Tampilan real-time, operator dashboard, dan pendaftaran mandiri.">
  <meta name="theme-color" content="#0D0D0F">

  <!-- Inter Font (Google Fonts CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Open Graph -->
  <meta property="og:title" content="Q-PREMIUM — Sistem Antrian Digital">
  <meta property="og:description" content="Manajemen antrian kelas premium untuk lembaga terkemuka.">
  <meta property="og:type" content="website">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Q-PREMIUM">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>Q-PREMIUM — Sistem Antrian Digital</title>

  <style>
    /* Premium loading splash */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0D0D0F;
      height: 100%;
      width: 100%;
    }
    #loading-splash {
      position: fixed;
      inset: 0;
      background: #0D0D0F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loading-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .splash-dot {
      width: 10px;
      height: 10px;
      background: #D4AF6A;
      border-radius: 50%;
      box-shadow: 0 0 16px #D4AF6A, 0 0 32px rgba(212,175,106,0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    .splash-title {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 3px;
    }
    .splash-bar {
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .splash-progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #D4AF6A, #F0D49A, #D4AF6A);
      border-radius: 2px;
      animation: progress 2s ease-out forwards;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes progress {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Premium loading splash -->
  <div id="loading-splash">
    <div class="splash-logo">
      <div class="splash-dot"></div>
      <span class="splash-title">Q-PREMIUM</span>
    </div>
    <div class="splash-bar">
      <div class="splash-progress"></div>
    </div>
  </div>

  <script>
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('loading-splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 700);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
